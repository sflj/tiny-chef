<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VanLife RPG - Sensor Lab</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #88a05e;
            --text-color: #e0e0e0;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            padding: 10px;
        }

        /* Sekcja ustawień na górze */
        #settings {
            width: 90%;
            max-width: 400px;
            background: #252525;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid #444;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 5px;
        }

        input[type=range] {
            width: 100%;
            accent-color: var(--accent-color);
        }

        #recipe-container {
            width: 90%;
            max-width: 400px;
            height: 300px;
            display: flex;
            overflow-x: auto; 
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            border: 2px solid #333;
            border-radius: 15px;
            background: var(--card-bg);
        }

        #recipe-container::-webkit-scrollbar { display: none; }

        .step {
            min-width: 100%;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .icon-recipe { font-size: 50px; margin-bottom: 10px; }

        #logger {
            width: 90%;
            max-width: 400px;
            margin-top: 15px;
            padding: 10px;
            background: #000;
            border-left: 3px solid var(--accent-color);
            font-size: 11px;
            color: #00ff00;
        }

        .val { font-weight: bold; color: #fff; }

        #sensor-btn {
            padding: 12px;
            width: 90%;
            max-width: 400px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-family: inherit;
            margin-bottom: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="settings">
        <div class="slider-label">
            <span>Czułość (Threshold):</span>
            <span id="threshold-val">0.20</span>
        </div>
        <input type="range" id="sensitivity-slider" min="0.05" max="1.0" step="0.05" value="0.20">
    </div>

    <button id="sensor-btn" onclick="requestAccess()">ODBLOKUJ SENSORY</button>

    <div id="recipe-container">
        <div class="step">
            <div class="icon-recipe">🪵</div>
            <p>1. START</p>
        </div>
        <div class="step">
            <div class="icon-recipe">🧪</div>
            <p>2. ŚRODEK</p>
        </div>
        <div class="step">
            <div class="icon-recipe">🍲</div>
            <p>3. KONIEC</p>
        </div>
    </div>

    <div id="logger">
        <div>X (Kierunek): <span id="val-x" class="val">0.00</span></div>
        <div style="font-size: 9px; color: #666;">(+) to ruch w prawo, (-) to ruch w lewo</div>
        <hr style="border: 0.5px solid #333; margin: 5px 0;">
        <div>Status: <span id="status-text">Czekam...</span></div>
    </div>

    <script>
        const container = document.getElementById('recipe-container');
        const debug = document.getElementById('status-text');
        const valX = document.getElementById('val-x');
        const slider = document.getElementById('sensitivity-slider');
        const thresholdLabel = document.getElementById('threshold-val');

        let isThrottled = false;
        let THRESHOLD = 0.20;

        // Aktualizacja progu z suwaka
        slider.oninput = function() {
            THRESHOLD = parseFloat(this.value);
            thresholdLabel.innerText = THRESHOLD.toFixed(2);
        }

        function move(direction) {
            if (isThrottled) return;
            isThrottled = true;

            const cardWidth = container.offsetWidth;
            
            if (direction === 'right') {
                container.scrollBy({ left: cardWidth, behavior: 'smooth' });
                debug.innerText = ">>> RUCH W PRAWO";
            } else {
                container.scrollBy({ left: -cardWidth, behavior: 'smooth' });
                debug.innerText = "<<< RUCH W LEWO";
            }

            setTimeout(() => { 
                isThrottled = false; 
                debug.innerText = "Gotowy";
            }, 1000); // 1 sekunda przerwy między tapnięciami
        }

        function requestAccess() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') startMotion();
                    });
            } else {
                startMotion();
            }
            document.getElementById('sensor-btn').style.display = 'none';
        }

        function startMotion() {
            window.addEventListener('devicemotion', (event) => {
                const acc = event.acceleration;
                if (!acc || !acc.x) return;

                const x = acc.x; // Surowa wartość (może być ujemna)
                valX.innerText = x.toFixed(3);

                // Sprawdzamy czy siła przekracza próg (używając wartości bezwzględnej)
                if (Math.abs(x) > THRESHOLD) {
                    if (x > 0) {
                        move('right');
                    } else {
                        move('left');
                    }
                }
            });
            debug.innerText = "Nasłuchuję uderzeń...";
        }
    </script>
</body>
</html>
