<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VanLife RPG Chef</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-main: #f0f0f0;
            --text-dim: #aaa;
            --type-default: #2a2825;
            --type-vege: #2d3524;
            --type-fish: #242d35;
            --accent-gold: #c5a059;
            --header-h: 52px;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Lato', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: var(--header-h);
        }

        /* --- UI COMPONENTS --- */
        
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: var(--header-h);
            background: #111;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        header h1 {
            margin: 0;
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: var(--accent-gold);
            text-transform: uppercase;
        }

        .filter-toggle {
            position: absolute;
            right: 15px;
            font-size: 1.2rem;
            cursor: pointer;
            user-select: none;
            padding: 5px;
        }

        /* --- FILTER PANEL --- */

        .filter-panel {
            display: none; /* Ukryty domyślnie */
            position: fixed;
            top: var(--header-h);
            width: 100%;
            max-width: 400px;
            background: #111;
            border-bottom: 1px solid #333;
            padding: 15px;
            box-sizing: border-box;
            flex-direction: column;
            gap: 15px;
            z-index: 90;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .filter-panel.visible {
            display: flex;
        }

        #tool-filter {
            width: 100%;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            outline: none;
            font-family: 'Lato', sans-serif;
        }

        #tool-filter:focus {
            border-color: var(--accent-gold);
        }

        .ingredient-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .ingredient-chip {
            padding: 6px 12px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            user-select: none;
            transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .ingredient-chip.active {
            background: var(--type-vege);
            border-color: var(--accent-gold);
        }

        .filter-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toggle-btn input { display: none; }
        .toggle-btn span {
            padding: 8px 15px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            user-select: none;
        }

        .toggle-btn input:checked + span {
            background: var(--type-vege);
            border-color: #4a5d23;
        }

        #apply-filters {
            padding: 10px 25px;
            background: var(--accent-gold);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Lato', sans-serif;
        }

        /* --- RECIPE LIST & CARDS --- */

        #recipe-list {
            width: 100%;
            max-width: 400px;
            padding: 20px 15px 40px 15px;
            box-sizing: border-box;
        }

        .recipe-card {
            border: 1px solid #444;
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        .card-header {
            padding: 12px 12px 8px 12px;
            display: flex;
            justify-content: center;
            background: transparent;
        }

        .recipe-name {
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--accent-gold);
            letter-spacing: 0.5px;
        }

        .card-body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .result-icon {
            font-size: 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 85px; 
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        .ingredients-row {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px;
            font-size: 1.6rem;
            background: rgba(0,0,0,0.1);
            padding: 8px 16px;
            border-top: 1px solid rgba(255,255,255,0.05);
            width: 100%;
            box-sizing: border-box;
        }

        .plus { font-size: 0.8rem; color: var(--text-dim); }

        .card-footer {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            align-items: center;
            padding: 10px 12px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 0.75rem;
        }

        .footer-center {
            text-align: center;
            color: var(--text-dim);
            font-weight: bold;
        }

        .footer-right { text-align: right; }

        .card-vege { background-color: var(--type-vege); border-color: #4a5d23; }
        .card-fish { background-color: var(--type-fish); border-color: #3b5a6b; }
        .card-default { background-color: var(--type-default); border-color: #444; }

        .energy-val, .diff-val { letter-spacing: 2px; }
        .energy-val { color: #ff5f5f; }
        .diff-val { color: #ffd700; }
    </style>
</head>
<body>

    <header>
        <h1>Campfire Deck</h1>
        <span class="filter-toggle" id="filter-btn">⚙️</span>
    </header>

    <div class="filter-panel" id="filter-panel">
        <select id="tool-filter">
            <option value="">Wszystkie narzędzia</option>
        </select>

        <div id="ingredient-cloud" class="ingredient-cloud"></div>

        <div class="filter-footer">
            <label class="toggle-btn">
                <input type="checkbox" id="vege-only">
                <span>🌿 Vege</span>
            </label>
            <button id="apply-filters">Filtruj</button>
        </div>
    </div>

    <div id="recipe-list"></div>

    <script>
        const recipeList = document.getElementById('recipe-list');
        const filterBtn = document.getElementById('filter-btn');
        const filterPanel = document.getElementById('filter-panel');
        const ingredientCloud = document.getElementById('ingredient-cloud');
        const toolSelect = document.getElementById('tool-filter');
        
        let allRecipes = [];
        let selectedIngredients = new Set();

        // Toggle panelu filtrów
        filterBtn.onclick = () => filterPanel.classList.toggle('visible');

        async function fetchRecipes() {
            try {
                const cacheBuster = new Date().getTime();
                const response = await fetch(`recipes.json?t=${cacheBuster}`);
                if (!response.ok) throw new Error('Baza nieosiągalna.');
                allRecipes = await response.json();
                
                generateFilters(allRecipes);
                renderDeck(allRecipes);
            } catch (err) {
                recipeList.innerHTML = `<div style="padding:20px; text-align:center;">BŁĄD: ${err.message}</div>`;
            }
        }

        function generateFilters(recipes) {
            const ingredientsMap = new Map();
            const toolsSet = new Set();

            recipes.forEach(r => {
                r.mainIngredients.forEach(ing => ingredientsMap.set(ing.item, ing.icon));
                if(r.tools) r.tools.forEach(t => toolsSet.add(t.icon));
            });

            // Narzędzia
            toolsSet.forEach(icon => {
                const opt = document.createElement('option');
                opt.value = icon;
                opt.textContent = `${icon} Narzędzie`;
                toolSelect.appendChild(opt);
            });

            // Składniki
            ingredientsMap.forEach((icon, name) => {
                const chip = document.createElement('div');
                chip.className = 'ingredient-chip';
                chip.innerHTML = `${icon} ${name}`;
                chip.onclick = () => {
                    chip.classList.toggle('active');
                    selectedIngredients.has(name) ? selectedIngredients.delete(name) : selectedIngredients.add(name);
                };
                ingredientCloud.appendChild(chip);
            });
        }

        document.getElementById('apply-filters').onclick = () => {
            const selectedTool = toolSelect.value;
            const vegeOnly = document.getElementById('vege-only').checked;

            const filtered = allRecipes.filter(recipe => {
                const toolMatch = !selectedTool || (recipe.tools && recipe.tools.some(t => t.icon === selectedTool));
                const recipeIngs = recipe.mainIngredients.map(i => i.item);
                const ingMatch = Array.from(selectedIngredients).every(name => recipeIngs.includes(name));
                const vegeMatch = !vegeOnly || recipe.tags.includes('vege');

                return toolMatch && ingMatch && vegeMatch;
            });

            renderDeck(filtered);
            filterPanel.classList.remove('visible'); // Zamknij po filtrowaniu
        };

        function renderDeck(recipes) {
            recipeList.innerHTML = '';
            if (recipes.length === 0) {
                recipeList.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-dim);">Brak dopasowanych zwojów...</div>`;
                return;
            }

            recipes.forEach(recipe => {
                const card = document.createElement('div');
                let typeClass = 'card-default';
                if (recipe.tags.includes('vege')) typeClass = 'card-vege';
                else if (recipe.tags.includes('fish')) typeClass = 'card-fish';
                card.className = `recipe-card ${typeClass}`;

                const allIcons = [...recipe.mainIngredients.map(i => i.icon), ...(recipe.tools ? recipe.tools.map(t => t.icon) : [])];
                const ingredientsHTML = allIcons.map(icon => `<span>${icon}</span>`).join('<span class="plus">+</span>');

                card.innerHTML = `
                    <div class="card-header"><span class="recipe-name">${recipe.name}</span></div>
                    <div class="card-body">
                        <div class="result-icon">${recipe.resultIcon}</div>
                        <div class="ingredients-row">${ingredientsHTML}</div>
                    </div>
                    <div class="card-footer">
                        <div class="footer-left"><span class="diff-val">${"⭐".repeat(recipe.difficulty)}</span></div>
                        <div class="footer-center">⏱️ ${recipe.prepTime} min</div>
                        <div class="footer-right"><span class="energy-val">${"❤️".repeat(recipe.energy)}</span></div>
                    </div>
                `;
                recipeList.appendChild(card);
            });
        }

        fetchRecipes();
    </script>
</body>
</html>
