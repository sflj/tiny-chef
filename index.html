<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VanLife Card Deck</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-main: #f0f0f0;
            --text-dim: #aaa;
            /* Kolory typów kart */
            --type-default: #2a2825; /* Brązowo-szary */
            --type-vege: #2d3524;    /* Mszysty zielony */
            --type-fish: #242d35;    /* Morski błękit */
            --accent-gold: #c5a059;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #recipe-list {
            width: 100%;
            max-width: 400px;
            padding: 15px;
            box-sizing: border-box;
        }

        .recipe-card {
            border: 1px solid #444;
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* Wspólny styl dla góry i dołu */
        .card-bar {
            padding: 6px 12px;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-header { border-bottom: 1px solid rgba(255,255,255,0.1); }
        .card-footer { border-top: 1px solid rgba(255,255,255,0.1); }

        .recipe-name {
            font-weight: bold;
            color: var(--accent-gold);
        }

        /* Sekcja centralna - wizualna */
        .card-body {
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .result-icon {
            font-size: 3.2rem;
            line-height: 1;
            margin-bottom: 5px;
        }

        .ingredients-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 1.2rem;
            background: rgba(255,255,255,0.05);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .plus { font-size: 0.8rem; color: var(--text-dim); }

        /* Dynamiczne kolory teł */
        .card-vege { background-color: var(--type-vege); border-color: #4a5d23; }
        .card-fish { background-color: var(--type-fish); border-color: #3b5a6b; }
        .card-default { background-color: var(--type-default); border-color: #444; }

        .energy-val { color: #ff5f5f; letter-spacing: -2px; }
        .diff-val { color: #ffd700; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="recipe-list">
        </div>

    <script>
        const recipes = [
            {
                id: "shakshuka",
                name: "Szakszuka",
                resultIcon: "🍳",
                energy: 3,
                difficulty: 1,
                prepTime: 12,
                tags: ["vege"],
                mainIngredients: [{ icon: "🥚" }, { icon: "🧅" }, { icon: "🍅" }]
            },
            {
                id: "tuna-pasta",
                name: "Makaron Tuńczyk",
                resultIcon: "🍝",
                energy: 4,
                difficulty: 2,
                prepTime: 10,
                tags: ["fish"],
                mainIngredients: [{ icon: "📦" }, { icon: "🐟" }]
            },
            {
                id: "stew",
                name: "Gulasz Wołowy",
                resultIcon: "🍲",
                energy: 5,
                difficulty: 3,
                prepTime: 40,
                tags: ["meat"],
                mainIngredients: [{ icon: "🥩" }, { icon: "🥔" }, { icon: "🥕" }]
            }
        ];

        function renderRecipes() {
            const list = document.getElementById('recipe-list');
            list.innerHTML = '';

            recipes.forEach(recipe => {
                const card = document.createElement('div');
                
                // Dobór koloru karty na podstawie tagów
                let typeClass = 'card-default';
                if (recipe.tags.includes('vege')) typeClass = 'card-vege';
                else if (recipe.tags.includes('fish')) typeClass = 'card-fish';
                
                card.className = `recipe-card ${typeClass}`;

                const ingredientsHTML = recipe.mainIngredients
                    .map(ing => `<span>${ing.icon}</span>`)
                    .join('<span class="plus">+</span>');

                card.innerHTML = `
                    <div class="card-bar card-header">
                        <span class="recipe-name">${recipe.name}</span>
                        <span>⏱️${recipe.prepTime}m</span>
                    </div>
                    
                    <div class="card-body">
                        <div class="result-icon">${recipe.resultIcon}</div>
                        <div class="ingredients-row">
                            ${ingredientsHTML}
                        </div>
                    </div>

                    <div class="card-bar card-footer">
                        <span class="diff-val">${"⭐".repeat(recipe.difficulty)}</span>
                        <span class="energy-val">${"❤️".repeat(recipe.energy)}</span>
                    </div>
                `;
                
                list.appendChild(card);
            });
        }

        renderRecipes();
    </script>
</body>
</html>
